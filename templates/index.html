<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>醫療影像分割系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 動畫 */
        .fade-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .loader {
                border: 4px solid rgba(255, 255, 255, 0.2);
                border-radius: 50%;
                border-top: 4px solid #3b82f6; /* Tailwind blue-500 */
                width: 48px;
                height: 48px;
                animation: spin 1s linear infinite;
            }
            @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        </style>
</head>

<body class="bg-gray-50 min-h-screen flex flex-col items-center font-sans text-gray-700 pt-24 pb-10">
    <!-- Loading screen -->
    <div id="loading-overlay" class="fixed inset-0 bg-gray-900/70 backdrop-blur-sm z-[100] hidden flex flex-col items-center justify-center transition-opacity duration-300">
        <div class="loader mb-4 shadow-lg"></div>
        <p class="text-white font-bold text-xl tracking-wider animate-pulse drop-shadow-md">正在進行影像分析，請稍候...</p>
        <p class="text-gray-300 text-sm mt-2">這可能需要幾秒鐘的時間</p>
    </div>

    <div class="fixed top-0 left-0 w-full bg-white/90 backdrop-blur-md z-50 shadow-sm border-b border-gray-200 transition-all duration-300">
        <div class="max-w-6xl mx-auto px-8 h-16 flex justify-between items-center">
            <div>
                <h1 class="text-xl font-extrabold tracking-tight text-gray-900 flex items-center gap-2">
                    <a href="{{ url_for('index') }}" class="flex items-center gap-2">
                        <span class="text-blue-600 text-2xl">●</span> 醫療影像分割系統
                    </a>
                </h1>
            </div>
            
            {% if current_user %}
                <div class="relative group">
                    <button class="flex items-center gap-2 text-gray-700 hover:text-blue-600 font-bold px-3 py-2 rounded-lg hover:bg-gray-50 transition">
                        {{ current_user.display_name }} 醫師
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                    </button>
                    <div class="absolute right-0 mt-2 w-48 bg-white rounded-xl shadow-xl py-2 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-300 border border-gray-100">
                        <a href="{{ url_for('history') }}" class="block px-4 py-2 text-sm text-gray-700 hover:bg-blue-50 hover:text-blue-600">病患歷史</a>
                        <a href="{{ url_for('setting') }}" class="block px-4 py-2 text-sm text-gray-700 hover:bg-blue-50 hover:text-blue-600">設定</a>
                        <a href="{{ url_for('logout') }}" class="block px-4 py-2 text-sm text-red-600 hover:bg-red-50 border-t border-gray-50 mt-1 pt-2">登出</a>
                    </div>
                </div>
            {% else %}
                <a href="{{ url_for('login') }}" class="bg-gray-900 hover:bg-black text-white text-sm font-bold px-5 py-2 rounded-lg transition shadow-md">登入</a>
            {% endif %}
        </div>
    </div>

    <div class="w-full max-w-5xl px-8">
        <div class="flex flex-col md:flex-row items-stretch justify-center gap-6">

            <div class="flex-1 bg-white p-6 rounded-3xl shadow-sm border border-gray-100 flex flex-col relative fade-in">
                
                {% if not current_user %}
                <div class="absolute inset-0 bg-white/60 backdrop-blur-[2px] z-20 flex flex-col items-center justify-center rounded-3xl">
                    <div class="w-16 h-16 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mb-4 shadow-inner">
                        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                    </div>
                    <p class="text-gray-800 font-bold text-xl mb-3 drop-shadow-sm">請先登入以使用分析系統</p>
                    <a href="{{ url_for('login') }}" class="bg-gray-900 text-white px-6 py-2 rounded-xl font-bold shadow-md hover:bg-black transition transform active:scale-95">前往登入</a>
                </div>
                {% endif %}

                <div class="absolute top-6 right-6 text-gray-300">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                </div>
                <h2 class="text-lg font-bold text-gray-800 mb-4">原始影像</h2>
                
                <form method="post" enctype="multipart/form-data" class="flex-1 flex flex-col">
                    <div class="flex-1 border-2 border-dashed border-gray-300 rounded-2xl bg-gray-50 hover:bg-blue-50 hover:border-blue-300 transition-colors cursor-pointer relative group flex flex-col items-center justify-center text-center p-8">
                        <label for="file-upload" class="absolute inset-0 cursor-pointer w-full h-full flex items-center justify-center z-10"></label>
                        <input id="file-upload" name="file" type="file" class="hidden" accept=".png, .jpg, .jpeg">
                        
                        <div id="upload-placeholder" class="space-y-3">
                            <div class="w-12 h-12 bg-gray-200 text-gray-400 rounded-full flex items-center justify-center mx-auto group-hover:bg-blue-200 group-hover:text-blue-600 transition">
                                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                            </div>
                            <p class="text-gray-500 text-sm font-medium group-hover:text-blue-600">點擊上傳影像<br><span class="text-xs text-gray-400 font-normal">支援 JPG, PNG</span></p>
                        </div>
                        <p id="file-name" class="hidden text-blue-600 font-bold text-lg"></p>
                    </div>

                    <button type="submit" class="mt-6 w-full bg-gray-900 hover:bg-black text-white font-bold py-3 px-6 rounded-xl transition shadow-lg transform active:scale-95">
                        開始分析
                    </button>
                </form>
            </div>

            <div class="hidden md:flex flex-col justify-center items-center text-gray-300">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
            </div>

            <div class="flex-1 bg-white p-6 rounded-3xl shadow-sm border border-gray-100 flex flex-col opacity-60">
                <h2 class="text-lg font-bold text-gray-400 mb-4">分割結果</h2>
                <div class="flex-1 border-2 border-dashed border-gray-200 rounded-2xl bg-gray-50 flex items-center justify-center">
                    <p class="text-gray-300 text-sm">等待執行影像分割...</p>
                </div>
                <div class="mt-6 h-12 w-full"></div> 
            </div>

        </div>
    </div>

    <script>
        const input = document.getElementById('file-upload');
        const placeholder = document.getElementById('upload-placeholder');
        const fileNameDisplay = document.getElementById('file-name');

        const form = document.querySelector('form');
        const loadingOverlay = document.getElementById('loading-overlay');

        input.addEventListener('change', (e) => {
            if(e.target.files.length > 0){
                placeholder.classList.add('hidden');
                fileNameDisplay.innerText = e.target.files[0].name;
                fileNameDisplay.classList.remove('hidden');
            }
        });

        form.addEventListener('submit', (e) => {
            // 防呆：如果沒有選擇檔案則阻擋
            if (input.files.length === 0) {
                e.preventDefault(); 
                // alert("請先點擊上方虛線框選擇要分析的影像！");
                return;
            }
            
            // 如果有檔案，顯示 Loading 遮罩
            loadingOverlay.classList.remove('hidden');
        });
    </script>
</body>
</html>

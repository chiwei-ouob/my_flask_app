<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>分析結果 - 醫療影像分割系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .fade-in { animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .loader { border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; border-top: 3px solid #ffffff; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>

<body class="bg-gray-50 min-h-screen flex flex-col items-center font-sans text-gray-700 pt-24 pb-10">
    
    <div class="fixed top-0 left-0 w-full bg-white/90 backdrop-blur-md z-50 shadow-sm border-b border-gray-200 transition-all duration-300">
        <div class="max-w-6xl mx-auto px-8 h-16 flex justify-between items-center">
            <div>
                <h1 class="text-xl font-extrabold tracking-tight text-gray-900 flex items-center gap-2">
                    <a href="{{ url_for('index') }}" class="flex items-center gap-2">
                        <span class="text-blue-600 text-2xl">●</span> 醫療影像分割系統
                    </a>
                </h1>
            </div>
            
            {% if current_user %}
                <div class="relative group">
                    <button class="flex items-center gap-2 text-gray-700 hover:text-blue-600 font-bold px-3 py-2 rounded-lg hover:bg-gray-50 transition">
                        {{ current_user.display_name }} 醫師
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                    </button>
                    <div class="absolute right-0 mt-2 w-48 bg-white rounded-xl shadow-xl py-2 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-300 border border-gray-100">
                        <a href="{{ url_for('history') }}" class="block px-4 py-2 text-sm text-gray-700 hover:bg-blue-50 hover:text-blue-600">病患歷史</a>
                        <a href="{{ url_for('setting') }}" class="block px-4 py-2 text-sm text-gray-700 hover:bg-blue-50 hover:text-blue-600">設定</a>
                        <a href="{{ url_for('logout') }}" class="block px-4 py-2 text-sm text-red-600 hover:bg-red-50 border-t border-gray-50 mt-1 pt-2">登出</a>
                    </div>
                </div>
            {% else %}
                <a href="{{ url_for('login') }}" class="bg-gray-900 hover:bg-black text-white text-sm font-bold px-5 py-2 rounded-lg transition shadow-md">登入</a>
            {% endif %}
        </div>
    </div>

    <div class="w-full max-w-xl mx-auto px-8 pt-24 pb-10">
        <h2 class="text-2xl font-bold text-gray-800 mb-6">系統設定</h2>
        
        <form method="post" class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100 mb-6 relative overflow-hidden">
            <div class="absolute top-0 right-0 w-16 h-16 bg-blue-50 rounded-bl-full -mr-4 -mt-4 opacity-50"></div>
            <h3 class="font-bold text-gray-800 mb-1 text-lg">個人檔案</h3>
            <p class="text-sm text-gray-500 mb-4">目前的顯示名稱：<span class="font-bold text-blue-600">{{ current_user.display_name }}</span></p>        
            <div class="flex gap-3">
                <input type="text" name="new_name" placeholder="輸入新的醫師姓名" required class="flex-1 px-4 py-2 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition">
                <button type="submit" name="action" value="change_name" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-xl text-sm font-bold shadow-md transition transform active:scale-95">更新名稱</button>
            </div>
        </form>
        
        <form method="post" class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100 mb-6">
            <h3 class="font-bold text-gray-700 mb-3">修改密碼</h3>
            <input type="password" name="new_password" placeholder="新密碼" required class="w-full px-4 py-2 border rounded-lg mb-3">
            <button type="submit" name="action" value="change_pwd" class="bg-gray-900 text-white px-4 py-2 rounded-lg text-sm font-bold">更新密碼</button>
        </form>

        <form method="post" class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100 mb-6">
            <h3 class="font-bold text-gray-700 mb-3 text-red-600">刪除病患</h3>
            <select name="patient_id" class="w-full px-4 py-2 border rounded-lg mb-3">
                {% for p in patients %}
                <option value="{{ p.id }}">{{ p.name }}</option>
                {% endfor %}
            </select>
            <button type="submit" name="action" value="delete_patient" class="bg-red-100 text-red-600 px-4 py-2 rounded-lg text-sm font-bold hover:bg-red-200">執行刪除</button>
        </form>

        <form method="post" onsubmit="return confirm('確定要刪除帳號嗎？此動作無法復原！');">
            <button type="submit" name="action" value="delete_account" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 rounded-xl shadow-md transition">
                刪除醫師帳號
            </button>
        </form>
    </div>
</body>
